services:
  # ==========================================================================
  # Database Migrations (runs once before app starts)
  # ==========================================================================
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    image: randomcoffeebot:${IMAGE_TAG:-latest}
    container_name: randomcoffee-migrate
    restart: "no"
    command: alembic upgrade head
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
    networks:
      - randomcoffee-internal
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ==========================================================================
  # Application
  # ==========================================================================
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    image: randomcoffeebot:${IMAGE_TAG:-latest}
    container_name: randomcoffee-app
    restart: always
    env_file:
      - .env.prod
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - randomcoffee-internal
      - randomcoffee-traefik
    healthcheck:
      test: ["CMD", "python", "/app/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${DOMAIN:-api.randomcoffee.example.com}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=8000"
      - "traefik.http.services.app.loadbalancer.healthcheck.path=/api/v1/health"
      - "traefik.http.services.app.loadbalancer.healthcheck.interval=30s"
      - "traefik.http.routers.app.middlewares=security-headers@file,rate-limit@file"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  db:
    image: postgres:16-alpine
    container_name: randomcoffee-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-randomcoffee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-randomcoffee}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    networks:
      - randomcoffee-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-randomcoffee} -d ${POSTGRES_DB:-randomcoffee}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================================================
  # Redis
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: randomcoffee-redis
    restart: always
    command: >-
      sh -c "redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass $${REDIS_PASSWORD}"
    env_file:
      - .env.prod
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - randomcoffee-internal
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ==========================================================================
  # Celery Worker
  # ==========================================================================
  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    image: randomcoffeebot:${IMAGE_TAG:-latest}
    container_name: randomcoffee-celery-worker
    restart: always
    command: celery -A app.workers.celery_app worker --loglevel=warning --concurrency=4
    env_file:
      - .env.prod
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - randomcoffee-internal
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================================================
  # Celery Beat (Scheduler)
  # ==========================================================================
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    image: randomcoffeebot:${IMAGE_TAG:-latest}
    container_name: randomcoffee-celery-beat
    restart: always
    command: celery -A app.workers.celery_app beat --loglevel=warning --pidfile=/tmp/celerybeat.pid
    env_file:
      - .env.prod
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - randomcoffee-internal
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ==========================================================================
  # Flower (Celery Monitoring)
  # ==========================================================================
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    image: randomcoffeebot:${IMAGE_TAG:-latest}
    container_name: randomcoffee-flower
    restart: always
    command: celery -A app.workers.celery_app flower --port=5555 --persistent=true --db=/data/flower.db
    env_file:
      - .env.prod
    environment:
      - FLOWER_BASIC_AUTH=${FLOWER_USER:-admin}:${FLOWER_PASSWORD}
    volumes:
      - flower_data:/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - randomcoffee-internal
      - randomcoffee-traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.flower.rule=Host(`flower.${DOMAIN:-randomcoffee.example.com}`)"
      - "traefik.http.routers.flower.entrypoints=websecure"
      - "traefik.http.routers.flower.tls=true"
      - "traefik.http.routers.flower.tls.certresolver=letsencrypt"
      - "traefik.http.services.flower.loadbalancer.server.port=5555"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ==========================================================================
  # Traefik (Reverse Proxy) - Production with TLS
  # ==========================================================================
  traefik:
    image: traefik:v3.2
    container_name: randomcoffee-traefik
    restart: always
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=randomcoffee-traefik"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entryPoints.web.address=:80"
      - "--entryPoints.web.http.redirections.entryPoint.to=websecure"
      - "--entryPoints.web.http.redirections.entryPoint.scheme=https"
      - "--entryPoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--log.level=WARN"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--accesslog.bufferingsize=100"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
      - traefik_logs:/var/log/traefik
      - ./deploy/traefik/dynamic:/etc/traefik/dynamic:ro
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    networks:
      - randomcoffee-traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN:-randomcoffee.example.com}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls=true"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth@docker"
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ==========================================================================
# Networks
# ==========================================================================
networks:
  randomcoffee-internal:
    driver: bridge
    internal: true
    name: randomcoffee-internal
  randomcoffee-traefik:
    driver: bridge
    name: randomcoffee-traefik

# ==========================================================================
# Volumes
# ==========================================================================
volumes:
  postgres_data:
    driver: local
    name: randomcoffee-postgres-data-prod
  redis_data:
    driver: local
    name: randomcoffee-redis-data-prod
  flower_data:
    driver: local
    name: randomcoffee-flower-data
  traefik_letsencrypt:
    driver: local
    name: randomcoffee-traefik-letsencrypt
  traefik_logs:
    driver: local
    name: randomcoffee-traefik-logs
