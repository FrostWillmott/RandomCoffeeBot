name: CI

on:
  push:
    branches: [main, master, develop, feature/*]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format
        run: uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy app

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests
        env:
          DEBUG: "true"
          SECRET_KEY: "test-secret-key-for-ci"
          TELEGRAM_BOT_TOKEN: "test:token"
          CHANNEL_ID: "@test_channel"
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/test"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          uv run pytest tests/unit/ -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: randomcoffee_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5434 && break
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Run database migrations
        env:
          DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5434/randomcoffee_test"
          DEBUG: "true"
          SECRET_KEY: "test-secret-key-for-ci"
          TELEGRAM_BOT_TOKEN: "test:token"
          CHANNEL_ID: "@test_channel"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          uv run alembic upgrade head

      - name: Run integration tests
        env:
          TEST_DATABASE_HOST: localhost
          TEST_DATABASE_PORT: "5434"
          TEST_DATABASE_USER: postgres
          TEST_DATABASE_PASSWORD: postgres
          TEST_DATABASE_NAME: randomcoffee_test
          DEBUG: "true"
          SECRET_KEY: "test-secret-key-for-ci"
          TELEGRAM_BOT_TOKEN: "test:token"
          CHANNEL_ID: "@test_channel"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          uv run pytest tests/integration/ -v

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install security tools
        run: pip install safety pip-audit

      - name: Export dependencies
        run: uv export --format requirements-txt --output-file requirements.txt

      - name: Run safety check
        run: safety check --file requirements.txt || true

      - name: Run pip-audit
        run: pip-audit --requirement requirements.txt || true
        continue-on-error: true

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: github.ref == 'refs/heads/main'

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          target: production
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/randomcoffeebot:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/randomcoffeebot:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/randomcoffeebot:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/randomcoffeebot:buildcache,mode=max
