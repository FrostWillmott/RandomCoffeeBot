services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: randomcoffee-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app:cached
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - randomcoffee-network

  db:
    image: postgres:16-alpine
    container_name: randomcoffee-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-randomcoffee}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - randomcoffee-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-randomcoffee}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: randomcoffee-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - randomcoffee-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  randomcoffee-network:
    driver: bridge
    name: randomcoffee-network

volumes:
  postgres_data:
    driver: local
    name: randomcoffee-postgres-data
  redis_data:
    driver: local
    name: randomcoffee-redis-data
