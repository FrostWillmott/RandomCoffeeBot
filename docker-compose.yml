services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: randomcoffee-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app:cached
      - /app/.venv
    depends_on:
      db:
        condition: service_healthy
    networks:
      - randomcoffee-network

  db:
    image: postgres:16-alpine
    container_name: randomcoffee-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: randomcoffee
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - randomcoffee-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d randomcoffee"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  randomcoffee-network:
    driver: bridge
    name: randomcoffee-network

volumes:
  postgres_data:
    driver: local
    name: randomcoffee-postgres-data
